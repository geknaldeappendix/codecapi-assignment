query SearchArtworks($query: String!, $first: Int!) {
  searchConnection(query: $query, first: $first, entities: [ARTWORK]) {
    edges {
      node {
        __typename
        ... on Artwork {
          internalID
          title
          slug
          artistNames
          image {
            thumb: url(version: "square")
            large: url(version: "large")
          }
        }
      }
    }
  }
}
