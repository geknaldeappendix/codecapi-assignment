query Artwork($id: String!) {
  artwork(id: $id) {
    title
    artistNames
    date
    medium
    saleMessage
    dimensions {
      cm
    }
    description(format: PLAIN)
    image {
      url(version: "large")
    }
    artist {
      highlights {
        partnersConnection(first: 12, displayOnPartnerProfile: true, representedBy: true) {
          edges {
            node {
              internalID
              name
              cities
              profile {
                icon {
                  url(version: "square")
                }
              }
            }
          }
        }
      }
    }
  }
}
